# ai-lib-go 项目概览
# Project Overview for ai-lib-go
# 
# 这是 AI-Protocol 规范的 Go 语言运行时实现
# Go runtime implementation for AI-Protocol specification

apiVersion: ai-lib-plans/v1
kind: ProjectOverview
metadata:
  name: ai-lib-go
  version: "0.5.0"
  created: 2026-03-09
  status: active
  repository: https://github.com/hiddenpath/ai-lib-go
  license: "MIT OR Apache-2.0"

spec:
  # 项目描述
  description: |
    Official Go Runtime for AI-Protocol - A high-performance, idiomatic Go implementation
    for unified AI model interaction across multiple providers.
    
    ai-lib-go 是 AI-Protocol 规范的官方 Go 运行时，提供：
    - 协议驱动的 provider 加载
    - 统一的 Chat API 接口
    - 原生 Go 并发模型（goroutine/channel）
    - 流式响应处理
    - 完整的错误处理和重试策略
    - 多模态支持

  # 项目目标
  goals:
    - 完整对齐 ai-lib-python 和 ai-lib-rust 的功能
    - 通过 ai-protocol compliance tests
    - 提供 idiomatic Go API
    - 支持 V1 和 V2 协议格式
    - 5 次迭代内完成核心功能

  # 功能范围（按迭代）
  iterations:
    - id: iter-1
      name: "项目初始化与协议加载"
      scope:
        - Go 项目结构搭建（gRPC/Cloud 风格）
        - go.mod 初始化
        - V1/V2 Protocol Loader 实现
        - 基础类型定义
      deliverables:
        - 可编译的 Go 模块
        - 协议加载器单元测试
        - README.md 和文档

    - id: iter-2
      name: "核心客户端与流式响应"
      scope:
        - AiClient 实现
        - Chat API (sync/stream)
        - SSE 流解码器
        - Event mapping
      deliverables:
        - 可用的 Chat 客户端
        - 流式响应示例
        - 集成测试

    - id: iter-3
      name: "错误处理与重试策略"
      scope:
        - 错误分类（error_classification）
        - 重试策略（exponential backoff）
        - Rate limiting
        - 标准错误码
      deliverables:
        - 完整的错误类型层次
        - 重试中间件
        - 错误处理文档

    - id: iter-4
      name: "工具调用与多模态"
      scope:
        - Tool Calling 支持
        - Vision 模态（图片输入）
        - Audio 模态（音频输入）
        - Video 模态（视频输入）
      deliverables:
        - 工具调用完整流程
        - 多模态类型定义
        - 多模态示例

    - id: iter-5
      name: "扩展能力与合规验证"
      scope:
        - Embeddings API
        - Batch API
        - STT/TTS
        - Reranking
        - Compliance tests 通过
      deliverables:
        - 所有扩展功能实现
        - 100% compliance tests 通过
        - 完整的 API 文档

  # 技术栈
  technology:
    language: "Go 1.21+"
    dependencies:
      - name: "标准库"
        modules:
          - "net/http"      # HTTP 客户端
          - "encoding/json" # JSON 处理
          - "encoding/xml"  # XML 处理（部分 provider）
          - "context"       # 上下文控制
          - "sync"          # 并发原语
    structure: "gRPC/Cloud 风格"
    layout:
      - "api/"          # 公共 API 定义
      - "internal/"     # 内部实现
      - "cmd/"          # CLI 工具
      - "pkg/"          # 可导出的包
      - "examples/"     # 使用示例
      - "tests/"        # 集成测试

  # 跨运行时对齐
  runtimeAlignment:
    reference: "ai-lib-python v0.8.x"
    parity:
      - "协议加载器（V1/V2）"
      - "Chat API（sync/stream）"
      - "错误分类与重试"
      - "工具调用"
      - "多模态支持"
      - "Embeddings/Batch/STT/TTS/Rerank"
    compliance:
      - "ai-protocol/tests/compliance/"

  # 架构约束（遵循 ai-lib-constitution）
  constraints:
    - id: ARCH-001
      description: "Protocol-driven design - 一切逻辑皆算子，一切配置皆协议"
    - id: ARCH-002
      description: "Operator pipeline - decode → select → accumulate → fanout → map"
    - id: ARCH-003
      description: "Cross-runtime consistency - 所有运行时必须通过 compliance tests"
    - id: ARCH-004
      description: "Default branch: main"

  # 文档约束（遵循 DOC-001/DOC-002）
  documentation:
    - id: DOC-001
      rule: "English code docs + Chinese module header"
    - id: DOC-002
      rule: "Internal work docs must stay private"

status:
  phase: "planning"
  currentIteration: null
  progress: 0
  blockers: []
  nextSteps:
    - "创建 GitHub 仓库 hiddenpath/ai-lib-go"
    - "初始化 Go 项目结构"
    - "实现 V1/V2 Protocol Loader"
