description: |
  Build a minimal cost-aware routing example in Prism (A-band library + C-band gateway HTTP).
  Implementation spec: docs/PR-PP-002-IMPLEMENTATION.md
  - Cost routing strategy: given request, select provider with lowest per-token cost
  - Pricing data source: external YAML/JSON (shared with Pricer where possible)
  - Route decision: compare costs across available healthy providers for requested model
  - HTTP: POST /v1/route/decide (task PR-P2-003; may ship same PR or immediately after)
  - Explicit "NOT PRODUCTION SLA" warning in code + docs
  - Example config with 5 P0 provider pricing (public pricing pages)
  - Integration test: verify routing selects cheapest option
  **Does not block on PT-073** — uses prism-core libcurl path (D6).
acceptance_criteria:
  - Cost routing selects lowest-cost provider for given model class
  - Pricing config is external (YAML/JSON), not hardcoded
  - Code and docs carry "not production SLA" warning
  - Integration test demonstrates cost-based routing decision
  - cost_router.rs in prism-core with unit tests
