id: PR-P1-003
title: "Key pool management (rotation + cooldown + circuit breaker)"
status: open
priority: P0
project: prism
phase: 1
depends_on: ["PR-P1-002"]
assignee: ""
created: "2026-04-25"
updated: "2026-04-25"

description: |
  Implement managed Key pool with health-aware scheduling:
  - KeyEntry state machine: Active / Cooldown / Disabled
  - RoundRobin strategy (Phase 1)
  - RateLimited → 60s cooldown
  - AuthError → disable key
  - Consecutive 5 errors → long cooldown (circuit breaker)
  - Auto-recovery when cooldown expires
  - Admin API to re-enable / inspect keys

acceptance_criteria:
  - Key pool rotates across multiple keys for same provider
  - RateLimited response triggers 60s cooldown, next request uses different key
  - AuthError disables key permanently (until admin re-enables)
  - Circuit breaker activates after 5 consecutive errors
  - Cooldown keys auto-recover after timeout

testing:
  strategy: "Unit tests for state machine + integration test with mock rate-limit responses"
