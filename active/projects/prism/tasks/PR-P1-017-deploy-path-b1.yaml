  Add Path B1 support to deployment tooling so Prism can share the existing Eos VPS
  (43.159.226.236) without port 80/443 conflict: Eos Caddy fronts both eos.ailib.info
  and api.prism.ailib.info; Prism gateway listens on loopback only.

acceptance_criteria:
  - deploy_prism_gateway.sh --remote 43.159.226.236 --path-b1 sets up Prism on loopback :18080
  - scripts/add-prism-to-eos-caddy.sh appends api.prism.ailib.info site block to /etc/caddy/Caddyfile and reloads
  - scripts/verify-production.sh succeeds when HTTPS = Eos Caddy fronts Prism via reverse_proxy

testing:
  strategy: |
    Dry-run deploy to VPS, then curl https://api.prism.ailib.info/health returns 200 + valid TLS.
