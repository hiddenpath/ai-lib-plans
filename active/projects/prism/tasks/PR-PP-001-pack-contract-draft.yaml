description: |
  Draft the Prism Pack capability contract:
  - Define JSON Schema for Pack manifest (extends ai-protocol v2 manifest)
  - Pack fields: id, name, version, provider_routes, signing_info, metadata
  - provider_routes: array of {provider, model, priority, cost_weight, capability_tags}
