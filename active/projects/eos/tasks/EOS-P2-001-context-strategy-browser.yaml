blocks:
  - id: "EOS-P2-R1"
    title: "宿主存储抽象（SessionMirror + ArtifactRef）"
    status: "pending"
    description: |
      ## 目标
      在 `static/js/session_mirror.js` 实现纯内存的会话镜像存储，待后续升级为 OPFS/IndexedDB。
      SessionMirror 本质是一个 **context optimizer**：在发送请求前按模型容量预算裁切上下文。

      ## 设计决策：Flat Truncation First，Strategy 可插拔

      Phase 2 不做分层预算（layer-based budget），先做最简单的 flat truncation。
      理由：
      - Phase 2 的 core pain 是**小窗口模型溢出**，flat 直接解决
      - 分层需要 LLM summarizer 集成 → 额外 LLM 调用 → 成本 + 延迟
      - Phase 2 无用户系统/云同步，对话不会太长，不会触发"丢错东西"的问题

      但接口**现在就预留 strategy 扩展点**：

      ```
      assembleMessages(maxTokens: number, strategy?: "flat" | "summary" | "layered"): Message[]
      ```

      默认 `"flat"`。后续演进：

      | Phase | Strategy | 做什么 |
      |-------|----------|--------|
      | 2 (现在) | `flat` | 从最新消息倒序累加 token，超容截断丢弃旧消息 |
      | 2+ | `summary` | LLM 压缩旧消息为摘要注入 system prompt |
      | 3 | `layered` | 分层预算：system(固定) + 最近N轮(50%) + 摘要(20%) + pinned(10%) + 搜索上下文(剩余) |

      ## 接口定义（TypeScript 伪码）
      ```typescript
      type AssembleStrategy = "flat" | "summary" | "layered";

      interface ArtifactRef {
        id: string;           // uuid, 对应大段 tool 输出/附件
        sizeBytes: number;    // 预估大小
        mime: string;         // "text/markdown" | "image/png" | ...
      }

      interface SessionMirror {
        // 追加对话事件
        append(entry: ChatEntry): void;
        // 按 id 获取 artifact 引用（不取载荷）
        getArtifactRef(id: string): ArtifactRef | null;
        // 按 id 获取 artifact 完整载荷
        getArtifactPayload(id: string): string | null;
        // 获取组装后的 messages 数组（不带超额 artifact 载荷）
        // strategy 默认 "flat"，预留给后续分层预算扩展
        assembleMessages(maxTokens: number, strategy?: AssembleStrategy): Message[];
        // 当前总 token 估算
        estimatedTokens(): number;
        // 清空
        clear(): void;
      }

      interface ChatEntry {
        role: "user" | "assistant" | "system" | "tool";
        content: string;
        artifacts?: ArtifactRef[];   // tool 输出不内联，用引用
        timestamp: number;
      }
      ```

      ## 实现步骤
      1. 在 `static/js/session_mirror.js` 创建模块（ES module，不依赖框架）
      2. 实现 `SessionMirror` 类：内部用 `ChatEntry[]` + `Map<string, ArtifactRef>` + `Map<string, string>`（id→payload）
      3. 实现 `assembleMessages(maxTokens, strategy="flat")`：
         - "flat" 策略：从最新消息开始累计 token 估算（粗估：1 token ≈ 4 chars）
         - 直到接近 maxTokens 时截断，丢弃最旧消息
         - 对于有 artifact 的条目：只保留 ref，不展开 payload
         - 其他 strategy 值返回 "flat" 行为 + console.warn（显式声明未实现）
      4. 单元测试：用 Jest 或最小 Node.js 脚本验证 append/assemble/clear 行为
      5. 在 `static/index.html` 的 `window.eosChat` 中挂载 mirror 实例

      ## 验收标准
      - [ ] `SessionMirror` 类可通过浏览器 console 直接创建和操作
      - [ ] `append()` 追加 100 条消息后 `estimatedTokens()` 返回非零值
      - [ ] `assembleMessages(500)` 在超容时截断返回 ≤500 token 预算的消息列表
      - [ ] `assembleMessages(500, "summary")` 返回 flat 行为 + console.warn（strategy 扩展点已验证）
      - [ ] `clear()` 后 `estimatedTokens()` 返回 0
