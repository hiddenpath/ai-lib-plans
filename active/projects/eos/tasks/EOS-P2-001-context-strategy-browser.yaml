    title: "宿主存储抽象（SessionMirror + ArtifactRef）"
    status: "completed"
    description: |
      PR #4 (`3a0c713`) 已合并；strategy 扩展点 follow-up 见 eos PR #5（仅 session_mirror.js，待合并）。

      ## 目标
      在 `static/js/session_mirror.js` 实现纯内存的会话镜像存储，待后续升级为 OPFS/IndexedDB。
      SessionMirror 本质是一个 **context optimizer**：在发送请求前按模型容量预算裁切上下文。

      ## 设计决策：Flat Truncation First，Strategy 可插拔

      Phase 2 不做分层预算（layer-based budget），先做最简单的 flat truncation。
      理由：
      - Phase 2 的 core pain 是**小窗口模型溢出**，flat 直接解决
      - 分层需要 LLM summarizer 集成 → 额外 LLM 调用 → 成本 + 延迟
      - Phase 2 无用户系统/云同步，对话不会太长，不会触发"丢错东西"的问题

      但接口**现在就预留 strategy 扩展点**：

      ```
      assembleMessages(maxTokens: number, strategy?: "flat" | "summary" | "layered"): Message[]
      ```

      默认 `"flat"`。后续演进：

      | Phase | Strategy | 做什么 |
      |-------|----------|--------|
      | 2 (现在) | `flat` | 从最新消息倒序累加 token，超容截断丢弃旧消息 |
      | 2+ | `summary` | LLM 压缩旧消息为摘要注入 system prompt |
      | 3 | `layered` | 分层预算：system(固定) + 最近N轮(50%) + 摘要(20%) + pinned(10%) + 搜索上下文(剩余) |

      ## 验收标准
      - [x] `SessionMirror` 类可通过浏览器 console 直接创建和操作
      - [x] `append()` 追加 100 条消息后 `estimatedTokens()` 返回非零值
      - [x] `assembleMessages(500)` 在超容时截断返回 ≤500 token 预算的消息列表
      - [x] `assembleMessages(500, "summary")` 返回 flat 行为 + console.warn（strategy 扩展点已验证）
      - [x] `clear()` 后 `estimatedTokens()` 返回 0
