blocks:
  - id: "ALT-QA-001-R1"
    title: "P0 簇：可用的 E/P 子路径导出（QA-ts-001/002/003）"
    status: "planned"
    severity: "P0"
    findings: ["QA-ts-001", "QA-ts-002", "QA-ts-003"]
    steps: |
      1. tsup 多入口：`tsup.config.ts` `entry: ['src/index.ts','src/core.ts','src/contact.ts']`；
         构建后验证 `dist/{index,core,contact}.{js,cjs,d.ts}` 均产出。
      2. 新增 `src/contact.ts`：聚合 P 层（routing/cache/batch/guardrails/negotiation/
         resilience/plugins/telemetry/interceptors/tokens）re-export；不含业务逻辑。
      3. 拆分 transport：将纯 E 的 HTTP/SSE 与 P 层 resilience 装饰器分离，使
         `src/core.ts`（`export * from './transport'`）不再传递性引入 `resilience`；
         `core.ts:6` 自述的 "Excludes: resilience" 须在实际依赖图成立。
      4. 加冒烟测试：从 `./core`、`./contact`、根三个入口 import 并断言关键符号存在。
    acceptance:
      - "node -e \"require('@ailib-official/ai-lib-ts/core')\" 与 /contact 均不报 ERR_MODULE_NOT_FOUND"
      - "构建产物含 dist/core.* 与 dist/contact.*"
      - "core 入口依赖图不含 resilience（可用 madge / import 静态检查证明）"

  - id: "ALT-QA-001-R2"
