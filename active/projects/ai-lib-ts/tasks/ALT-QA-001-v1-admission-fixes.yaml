    status: "planned"
    severity: "P1"
    findings: ["QA-ts-008", "QA-ts-009"]
    steps: |
      1. `src/transport/index.ts:135-154` `resolveBaseUrl()`：仅在显式测试标志
         （如 `AILIB_ALLOW_MOCK_URL=1` 或 `NODE_ENV==='test'`）下让 `MOCK_HTTP_URL` 生效；
         否则忽略，避免生产环境重定向 auth 头。
      2. `index.ts:34` 移除内置默认 `http://192.168.2.13:4010`，改 `127.0.0.1:4010` 或要求 env。
    acceptance:
      - "无测试标志时 MOCK_HTTP_URL 不改变 baseURL"
