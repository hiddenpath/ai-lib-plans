description: |
  Parallel multi-model comparison for the same user prompt:
  - Select 2–3 models from available /v1/models list (chip selector)
  - Fire parallel streaming completions via prism-sdk (Promise.all)
  - Side-by-side columns with per-model metrics: TTFT, total time
  - Compare mode toggle in app shell (Chat | Compare tabs)
  - Error isolation: single column failure doesn't block others
  - Responsive: grid collapses to single column on mobile (>=375px)
  - ProviderNav hidden in compare mode
acceptance_criteria:
  - User can compare at least 2 models in one run
  - Each column streams independently, token by token
  - Errors in one column do not block others
  - Compare UI usable on 375px viewport
  - typecheck + build pass
