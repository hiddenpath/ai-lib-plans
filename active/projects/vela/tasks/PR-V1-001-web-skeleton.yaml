description: |
  Bootstrap Vela web client (NOT Eos — see project-overview.md vs eos/brand-rationale.md).

  Monorepo `ailib-official/vela`:
  - Step 0: `packages/prism-sdk` → `@ailib-official/prism-sdk` (thin OpenAI-compatible client)
  - Step 1: `apps/web` → React + Vite chat SPA

  Scope:
  - Prism SDK: PrismClient, chat.completions (stream + non-stream), models.list()
  - Chat UI: message input, streaming display, model selector from GET /v1/models
  - Env: VITE_PRISM_BASE_URL (default api.prism.ailib.info), VITE_PRISM_API_KEY
  - Dev: Vite proxy to avoid browser CORS (no gateway CORS change in P1)
  - README + architecture diagram

acceptance_criteria:
  - @ailib-official/prism-sdk builds and exports PrismClient
  - Vela sends chat via Prism and renders streaming token-by-token
  - Model selector populated from GET /v1/models (gateway bearer key)
  - Connection errors show user-friendly messages
  - README covers local dev, proxy, endpoint config
  - npm publish @ailib-official/prism-sdk@0.1.0 before task close

