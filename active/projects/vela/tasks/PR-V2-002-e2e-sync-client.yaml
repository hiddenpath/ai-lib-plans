  Client-side E2E sync for Vela IndexedDB conversations (BIZ-004):
  - Port shared crypto from EOS-P2-003 ADR (AES-256-GCM + PBKDF2)
  - Export conversations/messages envelope; upload ciphertext blob
  - Sync UI: passphrase entry, push/pull, conflict message
  - Backend: configurable sync base URL (Eos /api/sync or future Vela host)
