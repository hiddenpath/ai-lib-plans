tech_considerations:
  architecture: |
    Memory management is split across two concerns:
    1. **Host → WASM ownership transfer**: ailib_out_consume + ailib_free
       defines the contract. Host owns data after consume; host must free.
    2. **WASM internal allocation**: Arena reduces allocator pressure.
       Not a full allocator replacement — fallback to dlmalloc for oversized.

    This layered approach avoids coupling to a specific WASM allocator
    (wee8, dlmalloc, etc.) — the external contract is just ptr+len+free.
  performance: |
    Arena pre-allocation target: <2% overhead vs raw malloc for typical
    chat request/response sizes (1-4KB per call).
    Zero-copy input eliminates one full serialization pass.
  security: |
    ailib_free must validate ptr belongs to WASM linear memory range
    before attempting Vec::from_raw_parts — bad ptr = UB.
    Consider a simple bounds check: ptr >= __heap_base.
  compatibility: |
    ailib_free + ailib_out_consume are additive — old callers that never
    call free will leak but not crash. Improvement, not breaking change.
  constitution_rules:
    - "ARCH-001: Protocol-driven design (memory contract is part of ABI)"
    - "ARCH-003: Cross-runtime consistency (arena model shared conceptually)"
