description: |
  Implement explicit memory management for WASM linear memory so that the
  host (JS or wasmtime) can allocate, read, and release WASM-side buffers
  without leaks, fragmentation, or unbounded growth.

  ## Problem

  Both WASM modules have memory management defects:

  **ai-lib-wasm (C ABI):**
  - Output goes to global `static LAST_OUT: Mutex<Vec<u8>>` — single instance,
    concurrent calls overwrite each other
  - Host reads via `ailib_out_ptr() + ailib_out_len()` but can never free
    the WASM-side allocation — memory grows unboundedly
  - No way to return buffer to WASM allocator after host consumes it

  **wasm-browser (wasm-bindgen):**
  - Each `Result` struct field returns `String` via `.clone()` — JS side gets
    a copy, but the WASM linear memory original is never freed
  - `BuildResult.body()`, `ParseResult.content()`, etc. all allocate fresh
    strings on every call — GC pressure on WASM side
  - Large streaming responses accumulate in WASM memory without release

  **Root cause:** WASM linear memory is a shared 4GB address space. Rust's
  allocator inside WASM can grow but never shrink the linear memory. Without
  explicit free, the host "borrows" data but can never return it.

  ## Proposed Solution

  ### Phase 1: Explicit Free (C ABI)

  ```rust
  /// Host calls after consuming ailib_out_ptr/len data.
  /// Releases the WASM-side Vec back to the linear memory allocator.
  #[no_mangle]
  pub unsafe extern "C" fn ailib_free(ptr: *mut u8, len: usize) {
      if !ptr.is_null() {
          let _ = Vec::from_raw_parts(ptr, len, len);
          // drop → dealloc → memory available for next allocation
      }
  }

  /// Consumes LAST_OUT and returns ownership to caller.
  /// After this, ailib_out_ptr/len return null/0 until next call.
  #[no_mangle]
  pub unsafe extern "C" fn ailib_out_consume() -> *const u8 {
      let mut g = LAST_OUT.lock().expect("out lock");
      let ptr = g.as_ptr();
      std::mem::forget(std::mem::take(&mut *g));
      // Caller must call ailib_free(ptr, len) when done
      ptr
  }
  ```

  ### Phase 2: Arena Pre-allocation

  ```rust
  struct WasmArena {
      chunks: Vec<Vec<u8>>,   // pre-allocated blocks
      current: usize,         // active block index
      block_size: usize,      // default 4KB
  }

  impl WasmArena {
      fn alloc(&mut self, size: usize) -> *mut u8 { ... }
      fn reset(&mut self) { self.current = 0; }  // bulk free
  }
  ```

  Arena reduces memory growth requests to the host — allocations cycle
  within pre-reserved blocks. `ailib_arena_reset()` frees all at once.

  ### Phase 3: Zero-copy Input (ArrayBuffer)

  ```rust
  // Instead of copying JSON string into WASM memory:
  // Host passes an ArrayBuffer that WASM maps directly
  #[no_mangle]
  pub unsafe extern "C" fn ailib_invoke_zc(
      op_ptr: *const u8, op_len: usize,
      input_ptr: *const u8, input_len: usize,  // already in WASM memory
  ) -> i32
  ```

  JS side: `wasm.memory.buffer` provides the shared ArrayBuffer.
  No serialization of input — pointer directly into WASM linear memory.

  ### Phase 4: wasm-bindgen Memory Hygiene

  For wasm-browser, wrap the JS interop with cleanup:

  ```js
  // After consuming a BuildResult:
  const result = ailib.build_chat_request(...);
  const body = result.body();  // String clone to JS
  result.free();               // Releases WASM-side Rust struct
  ```

  wasm-bindgen generates `.free()` for exported structs — just need to
  ensure all consumers call it.

