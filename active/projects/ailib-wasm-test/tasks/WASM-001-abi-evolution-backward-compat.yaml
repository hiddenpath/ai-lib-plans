description: |
  Design and implement a versioned, backward-compatible ABI for WASM exports
  so that both wasm-browser (wasm-bindgen) and ai-lib-wasm (C ABI) can evolve
  their interfaces without breaking existing consumers.

  ## Problem

  Current state has two WASM modules with fragile ABIs:

  1. **ai-lib-wasm (C ABI)**: `ailib_build_chat_request(handle, json_ptr, json_len)`
     — positional parameters. Adding a new parameter breaks all callers.
     Global `Mutex<Vec<...>>` for output — single-instance, not concurrent-safe.

  2. **wasm-browser (wasm-bindgen)**: `build_chat_request(messages_json, model, ...)`
     — wasm-bindgen auto-generates JS glue; version mismatch = runtime failure.

  Neither module has a mechanism for callers to negotiate capabilities or
  detect the supported ABI version at runtime.

  ## Proposed Solution

  ### Phase 1: Unified Versioned Entry Point (ai-lib-wasm C ABI)

  Replace individual exported functions with a single `ailib_invoke` dispatcher:

  ```rust
  #[no_mangle]
  pub unsafe extern "C" fn ailib_invoke(
      op_ptr: *const u8, op_len: usize,       // operation name
      input_ptr: *const u8, input_len: usize,  // structured input (JSON)
      ctx_ptr: *const u8, ctx_len: usize,      // ABI context (version + options)
  ) -> i32  // 0 = success, -1 = error (read ailib_out_*/ailib_err_*)
  ```

  Context JSON: `{"version": 2, "manifest_handle": 1, "stream_id": "..."}`
  New fields go in ctx JSON — old callers pass `{"version": 1}` and still work.

  ### Phase 2: Capability Negotiation

  ```rust
  #[no_mangle]
  pub extern "C" fn ailib_abi_version() -> u32  // returns 2

  #[no_mangle]
  pub extern "C" fn ailib_capabilities() -> *const u8
  // returns JSON: {"ops":["build_request","parse_response",...],"version":2}
  ```

  Host queries WASM on load — decides which ABI path to use.

  ### Phase 3: wasm-bindgen Structured Input

  For wasm-browser, switch from positional params to a single config object:

  ```js
  // Old: build_chat_request(messages_json, model, temperature, max_tokens, stream)
  // New: ailib_invoke({ op: "build_request", messages: [...], model: "...", ... })
  ```

  New fields in the object are optional — old call patterns still work.

  ### Compatibility Matrix

  | Host \\ WASM  | v1 only | v2 only | v1+v2 |
  |---------------|---------|---------|-------|
  | v1 host       | ✅ v1   | ❌      | ✅ v1 fallback |
  | v2 host       | ✅ v1   | ✅ v2   | ✅ v2 preferred |

