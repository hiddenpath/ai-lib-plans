tech_considerations:
  architecture: |
    Two WASM targets must converge on a shared ABI philosophy:
    - C ABI (ai-lib-wasm): ailib_invoke + ailib_free is the primary interface
    - wasm-bindgen (wasm-browser): ailib_invoke wrapper in JS, structured config

    The invoke pattern is inspired by WASI preview2 and Component Model
    canonical ABI — single entry point, structured args, versioned context.
  performance: |
    Single ailib_invoke entry has minimal dispatch overhead (string match on op).
    JSON context parse cost is negligible vs network I/O.
  security: |
    ABI version mismatch must not cause memory corruption — all paths
    through ailib_invoke must validate input before use.
  compatibility: |
    Additive-only rule: new fields in ctx/input JSON are optional.
    Old exported functions remain as thin wrappers over ailib_invoke.
    Breaking changes require a major ABI version bump + migration guide.
  constitution_rules:
    - "ARCH-001: Protocol-driven design (manifests drive behavior, ABI just dispatches)"
    - "ARCH-003: Cross-runtime consistency (C ABI + wasm-bindgen converge)"
