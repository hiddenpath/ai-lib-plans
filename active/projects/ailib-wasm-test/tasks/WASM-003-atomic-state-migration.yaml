tech_considerations:
  architecture: |
    The snapshot format is JSON (not binary) for three reasons:
    1. Schema evolution is easier — add optional fields, old readers ignore them
    2. Debuggability — humans can read and validate snapshots
    3. WASI compatibility — no filesystem or binary layout assumptions

    For very large states (100+ manifests), a binary format (MessagePack/CBOR)
    could be added as a Phase 5 optimization, but JSON is the stable baseline.

    The atomic guarantee: ailib_restore_state holds MANIFESTS lock for the
    entire duration. If deserialization fails, the lock is released with
    original state intact (no partial writes).
  performance: |
    Snapshot serialization cost: O(n) in number of manifests + active streams.
    Typical: 3-10 manifests, 0-2 active streams → <1ms.
    Not a hot path — called only during upgrades (rare).
  security: |
    Snapshot data should NOT contain API keys or secrets.
    ManifestEntry.raw_yaml may contain env var names but NOT resolved values.
    Validate snapshot schema version before restoring — reject unknown versions.
  compatibility: |
    Snapshot format version is independent of ABI version.
    A v2 ABI WASM instance can restore a v1 snapshot (best-effort field mapping).
    A v1 WASM instance cannot restore a v2 snapshot (reject with error).
    This follows the "new understands old, old rejects new" principle.
  constitution_rules:
    - "ARCH-001: Protocol-driven design (snapshot schema is a protocol)"
    - "ARCH-003: Cross-runtime consistency (snapshot format portable across hosts)"
    - "DOC-002: Internal work docs stay private (state format is internal)"
