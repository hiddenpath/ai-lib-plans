description: |
  Implement snapshot/restore for WASM internal state so that a WASM module
  can be hot-upgraded (new version loaded) without losing loaded manifests,
  active stream sessions, or accumulated metrics.

  ## Problem

  ai-lib-wasm stores state in global statics:

  ```rust
  static MANIFESTS: Mutex<Vec<Option<(ProtocolManifest, Vec<u8>)>>> = ...;
  static LAST_OUT: Mutex<Vec<u8>> = ...;
  static LAST_ERR: Mutex<Vec<u8>> = ...;
  ```

  When a new WASM binary is loaded (hot upgrade, rolling deploy):
  - All manifest handles become invalid — every loaded provider manifest is lost
  - In-flight stream sessions are destroyed — partial responses discarded
  - Accumulated metrics vanish — no usage record for the previous instance

  The wasm-browser module is stateless (pure functions), so the problem
  primarily affects ai-lib-wasm (C ABI, wasmtime host). But the gateway
  server will also need this for zero-downtime WASM upgrades.

  ## Proposed Solution

  ### Phase 1: State Serialization

  Define a serializable snapshot of all WASM-internal state:

  ```rust
  #[derive(Serialize, Deserialize)]
  struct WasmStateSnapshot {
      version: u32,                           // snapshot format version
      manifests: Vec<ManifestEntry>,           // loaded manifests + raw YAML
      active_streams: HashMap<String, StreamState>,  // in-flight streams
      metrics: WasmMetrics,                    // call counts, latencies, errors
      abi_version: u32,                        // WASM ABI that produced this snapshot
  }

  #[derive(Serialize, Deserialize)]
  struct ManifestEntry {
      id: String,
      provider_id: String,
      raw_yaml: Vec<u8>,          // original YAML bytes (for re-validation)
      loaded_at: u64,             // unix timestamp
  }

  #[derive(Serialize, Deserialize)]
  struct StreamState {
      stream_id: String,
      model: String,
      provider_id: String,
      accumulated_content: String,
      accumulated_thinking: String,
      tokens_so_far: u64,
      last_event_index: u32,      // resume point for replay
      started_at: u64,
  }

  #[derive(Serialize, Deserialize)]
  struct WasmMetrics {
      total_calls: u64,
      total_tokens_in: u64,
      total_tokens_out: u64,
      error_counts: HashMap<String, u64>,   // error_code → count
      latency_sum_ms: u64,
  }
  ```

  Export functions for host-driven snapshot lifecycle:

  ```rust
  /// Serialize all internal state to JSON bytes.
  /// Output in ailib_out_*/ailib_out_len() (consumed via ailib_out_consume).
  #[no_mangle]
  pub extern "C" fn ailib_snapshot_state() -> i32;

  /// Deserialize and apply a snapshot. Atomic: either fully applies or no change.
  /// Returns 0 on success, -1 on error (read ailib_err_*).
  #[no_mangle]
  pub unsafe extern "C" fn ailib_restore_state(
      snap_ptr: *const u8, snap_len: usize
  ) -> i32;
  ```

  ### Phase 2: Stream Session Continuation

  When restoring a snapshot with active streams:

  1. **Replay strategy**: The new WASM instance cannot resume a provider SSE
     stream — the HTTP connection died with the old instance. Instead:
     - Mark stream as `needs_replay` in the restored state
     - Return `{"status": "needs_replay", "from_index": N}` to the host
     - Host (P layer / gateway) decides: re-request from provider, or inform
       the client that the stream was interrupted

  2. **Accumulated content preservation**: Whatever partial content was
     captured before the upgrade is preserved in the snapshot. The client
     sees a seamless continuation (previous content + new content from replay).

  ### Phase 3: Host Integration (wasmtime)

  ```rust
  // In the wasmtime harness (ai-lib-wasmtime-harness):
  fn hot_upgrade(new_wasm: &[u8]) -> Result<()> {
      // 1. Ask old instance for snapshot
      let snapshot = old_instance.call("ailib_snapshot_state")?;

      // 2. Load new WASM instance
      let new_instance = Instance::new(&mut store, new_wasm)?;

      // 3. Restore snapshot into new instance
      new_instance.call("ailib_restore_state", snapshot)?;

      // 4. Atomic swap — new instance is now active
      std::mem::swap(&mut active_instance, &mut new_instance);

      // 5. Drop old instance
      drop(old_instance);

      Ok(())
  }
  ```

  ### Phase 4: Gateway Server Integration

  The ailib-wasm-test server (and future ai-lib-gateway) uses this for
  zero-downtime WASM upgrades:

  ```rust
  // In Axum server:
  async fn upgrade_wasm(new_bytes: Vec<u8>) {
      let state = app_state.wasm_instance.snapshot();
      let new_instance = WasmInstance::new(&new_bytes);
      new_instance.restore(state)?;
      app_state.wasm_instance.swap(new_instance);
  }
  ```

