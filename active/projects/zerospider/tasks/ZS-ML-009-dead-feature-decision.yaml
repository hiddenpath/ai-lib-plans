  - "若选 remove：`docs/ai-lib-migration.md` 与 `docs/migration-legacy-to-protocol.md` 中相关段落同步更新"
  - "PR 描述中包含与审计 R8（dead feature flags）和 R5（metrics 决策）的对照"

