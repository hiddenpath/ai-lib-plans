description: |
  Local and team clones must treat `ailib-official/zerospider` as the **default** push/pull
  remote. Today many clones still use `origin -> hiddenpath` while `main` tracks that
  upstream, causing false ahead/behind and accidental pulls from archived remotes.

  Deliver either:
  - (A) rename remotes so `origin` is ailib-official; or
  - (B) keep two remotes but set `main` upstream to `ailib-official/main` only.

  Optional small PR: CONTRIBUTING / ai-lib-migration doc one-liner on canonical clone URL.

acceptance_criteria:
  - "`git branch -vv` shows main tracking ailib-official/main (or origin after rename)"
  - "`git status -sb` on clean main matches official (no spurious ahead 29 vs hiddenpath)"
  - "Documented canonical URL in-repo if CONTRIBUTING exists"

