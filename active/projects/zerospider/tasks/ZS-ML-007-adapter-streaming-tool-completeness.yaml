description: |
  迁移计划 Phase 1（适配层）实测覆盖不足，由 2026-04-27 审计与 2026-04-28
  开发侧交叉核实确认。本任务关闭以下确认存在的真实缺口：

  1. `ProtocolBackedProvider::stream_chat_with_system`（`src/providers/protocol_adapter.rs`
     约 363–385 行）只处理 `PartialContentDelta` / `ThinkingDelta` / `StreamEnd`，
     `Ok(_) => {}` 默默丢弃 `PartialToolCall` 等事件。流式 + 工具调用场景下
     Agent 会无声地丢失工具决策，属高优先级缺陷。
  2. `convert_messages` 仅有单轮 tool 测试（`tool_call_id` 一条），缺多轮工具
     对话（assistant→tool_call→tool→assistant）覆盖。
  3. `protocol_adapter.rs` 完全没有流式集成测试（含工具 / 不含工具）。

  非范围：
  - 不引入聚合平台或代理层；
  - 不动 `ReliableProvider` 与 `[reliability]` 边界（由 ZS-ML-008 处理）；
  - 不修改 ai-lib-rust 上游 API。

acceptance_criteria:
