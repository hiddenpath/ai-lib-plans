# VL-UI-005 — Phase 1b Frontend

## Scope

### Directory layout (proposed)

```
velaclaw/
  ui-chat/          # Svelte 5 + Vite project
    src/
    package.json
  src/gateway/
    static_embed.rs # rust-embed Assets from ui-chat/dist
```

### UI features (MVP)

1. Chat thread (current session only; persistence → VL-UI-003)
2. Streaming markdown rendering (basic)
3. Model / logical `provider/model` selector
4. Connection status + pairing token input (localStorage)
5. Error toasts for API failures

### Non-goals (Phase 1b)

- Memory browser, config editor (VL-UI-003)
- Tool approval modal full UX (stub ok; complete in VL-UI-004)
- i18n (English first; zh-CN follow-up)

### Build integration

- CI: `npm ci && npm run build` in `ui-chat/` before `cargo build --release`
- Feature flag optional: `web-chat-ui` (default **on** for desktop builds; off for minimal Pi if needed later)

