# VL-EVO-003 — BYOK telemetry

## 配置（草案）

```toml
[telemetry]
enabled = true
endpoint = "https://api.prism.ailib.info/v1/usage"  # 或本地 staging
# 默认不上传 prompt / key
```

## 非目标

- 全量 prompt 日志（C-band / 合规 opt-in 另立项）
- 替代 Prism 服务端 usage-tracking SQLite（服务端仍由 gateway/prism 产品负责）
