# VL-UI-003 — Phase 2

## Backend endpoints

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/sessions` | GET, POST | List / create chat sessions |
| `/api/sessions/:id` | GET, DELETE | Session detail + messages; delete |
| `/api/memory` | GET | Paginated memory (`q`, `limit`, `offset`, date filters) |
| `/api/memory/:id` | GET | Single entry |
| `/api/config` | GET, PUT | Masked read; validated partial write |
| `/api/config/schema` | GET | schemars export for forms |

## Security

- Secrets: mask as `****`; PUT rejects fields that look like API keys
- Audit log for config changes (tracing + optional file)
- Memory API: redact credential patterns in content (reuse scrub_credentials)

## Frontend

1. **Chat** — session sidebar, new/rename/delete session
2. **Memory** — search, pagination, detail expand
3. **Settings** — schema-driven form; link to env var names for BYOK keys
4. **Onboard hints** — AI_PROTOCOL_DIR path picker + validate (wizard-interactive-fixup)

## Moved from old Phase 3

- Provider list detail view stays on GET `/api/providers` (VL-UI-002); Phase 2 adds **default model** edit via `/api/config` only
