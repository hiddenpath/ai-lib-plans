# VelaClaw Web Chat UI — Phase 2 — VL-UI-003

## Scope

### Backend — Gateway REST endpoints

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/memory` | GET | List/query memory entries. Query params: `q` (search), `limit`, `offset`, `start_date`, `end_date`. |
| `/api/memory/<id>` | GET | Single memory entry detail |
| `/api/config` | GET | Return current config. Secrets masked (show `****` in place of actual values). |
| `/api/config` | PUT | Update config. Accepts partial JSON patch. Validates before persisting. |
| `/api/config/schema` | GET | Return config schema for form generation (field types, constraints, descriptions). |

### Security considerations — config editing

- Secrets (API keys, tokens) must NEVER be sent to the frontend
- Config writes must validate against schema before persisting
- Consider an audit log for config changes

### Frontend additions

1. **Memory browser tab**
   - Search bar + paginated results list
   - Entry detail view (click to expand)
   - Date range filter

2. **Config editor tab**
   - Form rendered from schema (`GET /api/config/schema`)
   - Read-only view with masked secrets (default)
   - Edit mode with validation
   - Save/cancel buttons

### Multi-crate readiness

Same principle as Phase 1: keep handler code in dedicated modules
under `src/gateway/` for future extraction into `crates/velaclaw-gateway/`.