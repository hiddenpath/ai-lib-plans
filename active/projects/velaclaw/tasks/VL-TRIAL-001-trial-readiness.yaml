# VelaClaw Trial Readiness — VL-TRIAL-001

## Objective

Enable end-to-end testing of VelaClaw with existing API credentials
(DeepSeek, NVIDIA, OpenAI) through the local proxy.

---

## Task Items

### P0 — Blocking (no test possible without these)

### VL-TRIAL-001-A: Fix model-name-passing bug

| Field | Value |
|-------|-------|
| **Type** | Code fix |
| **File** | `src/providers/protocol_adapter.rs` |
| **Impact** | All providers |
| **Root Cause** | `effective_model_id()` at line ~27 returns `provider/model` (e.g. `deepseek/deepseek-v4-pro`), which is passed to `ChatRequestBuilder::model()` at lines 186, 220, 407. The API receives the full string and rejects it because it doesn't recognize the `provider/` prefix. ai-lib-rust's `AiClient` already stores the correct `model_id` (stripped of provider prefix) — we just shouldn't override it. |
| **Fix** | Remove `.model(&logical)` calls on lines 186, 220, and 407. The ChatRequestBuilder will fall back to `client.model_id`, which is correctly set by ai-lib-rust's `AiClientBuilder::build()` (it splits on `/` and keeps `parts[1..]`). |

After fix, model will be sent as `deepseek-v4-pro` instead of `deepseek/deepseek-v4-pro`.

### P1 — High Priority

### VL-TRIAL-001-B: Update DeepSeek model manifest

| Field | Value |
|-------|-------|
| **Type** | Config (ai-protocol) |
| **Files** | `ai-protocol/v1/models/deepseek-chat.yaml` |
| | `ai-protocol/dist/v1/models/deepseek-chat.json` |
| **Status** | ✅ Locally patched, not committed |
| **Details** | DeepSeek API now requires model names `deepseek-v4-pro` or `deepseek-v4-flash`. The manifest still has `deepseek-chat` and `deepseek-reasoner`. |
| **Changes** | `deepseek-chat` → `deepseek-v4-pro` (map `model_id`), `deepseek-reasoner` → `deepseek-v4-flash`. |
| **Action** | PR to ailib-official/ai-protocol updating both v1 YAML source and dist/v1 JSON. |

### VL-TRIAL-001-C: Create NVIDIA v2 provider manifest

| Field | Value |
|-------|-------|
| **Type** | Config (ai-protocol) |
| **Source** | `ai-protocol/v1/providers/nvidia.yaml` (complete and working) |
| **Output** | `ai-protocol/dist/v2/providers/nvidia.json` |
| **Reason** | VelaClaw's `providers` command only lists v2 manifest providers. NVIDIA is only defined in v1 today. The `protocol-providers` subcommand discovers NVIDIA, but the main provider routing doesn't expose it. |
| **NVIDIA API details** | Base URL: `https://integrate.api.nvidia.com/v1`, Auth: `NVIDIA_API_KEY` bearer token, Format: OpenAI-compatible. |
| **Action** | Create v2 JSON manifest from the v1 YAML source, then PR to ai-protocol. |

### VL-TRIAL-001-D: Configure proxy channel

| Field | Value |
|-------|-------|
| **Type** | Environment / config |
| **Value** | `AI_PROXY_URL=http://192.168.2.13:8887` |
| **Where to set** | `~/.bashrc` or `~/.bash_profile` or VelaClaw config |
| **Reason** | ai-lib-rust reads `AI_PROXY_URL` (then `HTTPS_PROXY`/`HTTP_PROXY`) to set up the reqwest proxy. The standard `http_proxy` is NOT read. Without this, calls to OpenAI/DeepSeek/NVIDIA API time out. |

### P2 — Important but non-blocking

### VL-TRIAL-001-E: Persist API credentials

| Field | Value |
|-------|-------|
| **Type** | Config |
| **Current state** | API keys exist in `~/.bashrc` (OpenAI, DeepSeek, Groq). NVIDIA key in `~/.openclaw/openclaw.json`. |
| **Problem** | `~/.bashrc` has a guard (`case $- in *i*) ;; *) return;; esac`) that exits early in non-interactive shells. CGI scripts, remote exec, cron, and daemonized VelaClaw will not see the keys. |
| **Options** | (a) Copy key exports to `~/.bash_profile` which is read by login shells; (b) Create a `~/.env` file sourced from both; (c) Store credentials in VelaClaw config's credential fields. |
| **Recommendation** | Option (a) or (b) — minimal change, no code dependency. |

### VL-TRIAL-001-F: Update VelaClaw default config

| Field | Value |
|-------|-------|
| **Type** | Config |
| **File** | `~/.velaclaw/config.toml` |
| **Current** | `default_provider = "deepseek/deepseek-v4-pro"` |
| **Note** | Once NVIDIA v2 manifest is created, can set default to a cost-effective model like `nvidia/moonshotai/kimi-k2-instruct` or stay with DeepSeek. |

### P3 — Polish

### VL-TRIAL-001-G: Run `velaclaw onboard`

Initialize workspace and confirm trial-ready config.

### VL-TRIAL-001-H: Test all three call paths

- Single-turn chat (`velaclaw agent -m "hello"`)
- Streaming chat
- Multi-turn conversation

### VL-TRIAL-001-I: Test provider fallback

Configure 2+ providers in fallback chain and verify automatic failover.

