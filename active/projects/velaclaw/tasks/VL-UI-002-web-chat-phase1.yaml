# VelaClaw Web Chat UI — Phase 1 — VL-UI-002

## Scope

### Backend — Gateway additions

Add the following to `src/gateway/mod.rs` (or, if ready, to a new module):

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/chat` | POST | Non-streaming chat. Accepts `{ messages, provider?, temperature?, max_tokens? }`. Returns `{ id, content, usage, cost }`. |
| `/ws` | GET (upgrade) | WebSocket for streaming chat. Client sends `{ type: "chat", messages, ... }`, server streams `{ type: "delta", content }` + `{ type: "done", usage, cost }`. |
| `/` | GET | Serve frontend SPA (index.html). |

Existing routes (`/health`, `/dashboard`, `/pair`, `/webhook`, etc.) remain unchanged.

### Frontend

A single-page chat application (framework TBD) that:

1. Loads at the root URL of the gateway
2. Connects via WebSocket to `/ws`
3. Provides a text input + send button
4. Displays streaming responses in real-time
5. Shows conversation history (current session only; persistence in Phase 2)
6. Shows model / provider selection (reads from available list)

### Multi-crate readiness note

Design the new code so that `AppState`, handler functions, and WebSocket
session management can be easily extracted into `crates/velaclaw-gateway/`
in a future phase.  Specifically:
- Keep handler functions in their own module(s) under `src/gateway/`
- Do not add new dependencies to the root `Cargo.toml` that would make
  future extraction harder (prefer existing tokio + axum deps)
- The SPA assets (HTML/JS/CSS) should be embeddable independently

### Proposed API Contract

**POST /api/chat**
Request:
```json
{
  "messages": [{"role": "user", "content": "hello"}],
  "provider": "deepseek/deepseek-v4-pro",
  "temperature": 0.7,
  "max_tokens": 4096
}
```
Response:
```json
{
  "id": "chat_xxx",
  "content": "Hello! How can I help?",
  "usage": {"input_tokens": 10, "output_tokens": 5},
  "cost": 0.000035
}
```

**WebSocket /ws**
Client → Server:
```json
{"type": "chat", "messages": [...], "provider": "..."}
```
Server → Client (streaming):
```json
{"type": "delta", "content": "Hello"}
{"type": "delta", "content": "! How"}
...
{"type": "done", "usage": {...}, "cost": 0.000035}
```

### Open Decisions for Cursor Discussion

1. Frontend framework: React / Vue / Svelte / vanilla JS / HTMX?
2. Embed frontend assets via `rust-embed` at compile time, or serve from filesystem (dev) + embed (release)?
3. Auth model for `/api/chat` and `/ws` (none for localhost? bearer token?)