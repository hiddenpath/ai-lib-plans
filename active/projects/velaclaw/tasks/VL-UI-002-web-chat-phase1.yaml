# VelaClaw Web Chat UI — Phase 1a — VL-UI-002

## Scope

### Backend — New gateway modules

Prefer new files under `src/gateway/` rather than growing `mod.rs` monolith:

| Module | Responsibility |
|--------|----------------|
| `chat_api.rs` | POST `/api/chat`, request/response types |
| `chat_ws.rs` | GET `/ws` upgrade, session stream |
| `providers_api.rs` | GET `/api/providers` |

### Endpoints

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/chat` | POST | Non-streaming. Body: `{ messages, model_id?, temperature?, max_tokens? }`. Uses **agent loop**. |
| `/ws` | GET | WebSocket streaming chat. See `VELACLAW_PHASE_UI_PLAN_2026-06.md` §4. |
| `/api/providers` | GET | Logical models from `protocol_registry` + `available` flag (PT-074 credential chain). |

**Not in this task**: GET `/chat` SPA (VL-UI-005), memory/config/cron APIs.

Existing routes (`/health`, `/dashboard`, `/pair`, `/webhook`, …) unchanged.

### Architecture rules (VL-ARCH-001)

1. **No duplicate execution** — handlers delegate to `Agent` / existing `run_tool_call_loop`, not raw `Provider::chat`.
2. **BYOK** — credentials via ai-lib PT-074; gateway never accepts API keys in JSON body.
3. **Observer hook** — wire `ObserverEvent` so UI can later show tool progress (emit `tool_start`/`tool_end` on WS when ready).
4. **EVO-001** — may land in parallel; when `ExecutionHandle` exists, chat handlers switch to it without breaking WS contract.

### Auth

- Reuse `PairingGuard::authorize` pattern from webhook handlers.
- Unauthenticated → 401 with hint to `POST /pair`.

### API Contract

**POST /api/chat**
```json
// Request
{"messages":[{"role":"user","content":"hello"}],"model_id":"deepseek/deepseek-v4-pro","temperature":0.7}
// Response
{"id":"chat_xxx","content":"...","usage":{"input_tokens":10,"output_tokens":5},"cost":0.000035}
```

**WebSocket** — see `VELACLAW_PHASE_UI_PLAN_2026-06.md` §4.

### Out of scope

- rust-embed / Svelte (VL-UI-005)
- Session persistence across reload (VL-UI-003)
- Tool approval UI (VL-UI-004; WS event stub ok)

## Suggested PR split

Single PR acceptable if reviewable; optional sub-commits: (1) types + auth, (2) REST, (3) WS.
