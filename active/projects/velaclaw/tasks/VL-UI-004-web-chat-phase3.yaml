# VL-UI-004 — Phase 3

## Backend

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/cron` | GET, POST | List / create |
| `/api/cron/:id` | GET, PUT, DELETE | Detail / update / delete |
| `/api/cron/:id/run` | POST | Immediate run |
| `/api/tools` | GET | Tool catalog (name, description, parameters) |
| `/api/providers/:id/test` | POST | Connectivity smoke (no key in response) |
| `/api/approvals/:id/respond` | POST | `{ approved: true/false }` |

**Removed** (vs original draft): `PUT /api/config/provider` — use Phase 2 `PUT /api/config` with `default_provider` / `default_model` fields.

## Frontend

1. **Cron manager** — functional CRUD + run now
2. **Tool inspector** — read-only
3. **Approval modal** — wired to WS `approval_required`
4. **Ops link** — prominent link to legacy `/dashboard` cost panel

## Multi-crate

If `crates/velaclaw-gateway` extraction started, add endpoints there; else `src/gateway/ops_api.rs`.
