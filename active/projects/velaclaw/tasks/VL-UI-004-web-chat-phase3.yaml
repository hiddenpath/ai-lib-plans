# VelaClaw Web Chat UI — Phase 3 — VL-UI-004

## Scope

### Backend — Gateway REST endpoints

| Endpoint | Method | Description |
|----------|--------|-------------|
| `/api/cron` | GET | List cron jobs (id, name, schedule, last_run, next_run, status) |
| `/api/cron` | POST | Create cron job `{ name, schedule, action, enabled }` |
| `/api/cron/<id>` | GET | Single cron job detail |
| `/api/cron/<id>` | PUT | Update cron job |
| `/api/cron/<id>` | DELETE | Remove cron job |
| `/api/cron/<id>/run` | POST | Trigger immediate run |
| `/api/tools` | GET | List available tools (name, description, parameters, enabled) |
| `/api/providers` | GET | List available providers with status (available, requires_key, configurable) |
| `/api/providers/<id>/test` | POST | Test provider connectivity |
| `/api/config/provider` | PUT | Switch default provider `{ provider, model }` |

### Frontend additions

1. **Cron manager tab**
   - Job list with status badges (active/paused/error)
   - Create/edit form with schedule expression validator
   - Manual run button per job
   - Last run time + next run time display
   - Delete with confirmation

2. **Tool inspector tab**
   - Read-only list of available tools
   - Expandable detail: description, parameters, return values
   - Enable/disable toggle (if supported by backend)

3. **Provider switcher tab**
   - List of providers with availability status
   - Current default provider highlighted
   - Test connectivity button
   - Provider switch confirmation

### UX/design notes

- Phase 3 is primarily operational; keep UI functional rather than polished
- The provider switcher should be prominent (quick-access, not buried in settings)
- Cron management can be more detailed (JSON-based editor acceptable)

### Multi-crate readiness

By Phase 3, if multi-crate extraction is underway, these new endpoints
should be added directly to `crates/velaclaw-gateway/` instead of
`src/gateway/`.