# VL-EVO-001 — ExecutionHandle

## 参考

- `VL-ARCH-001-execution-strategy-boundary.md` §2、§4
- `VELACLAW_PHASE_EVO_PLAN_2026-06.md` EVO-1

## 实现要点

1. 定义 `ExecutionHandle` / `ExecutionBackend::Byok(Arc<AiClient>)`
2. Agent loop 经 ExecutionHandle 调用，不再直接依赖 `ProtocolBackedProvider` 的 chat 路径
3. Config schema 预留 `[routing]` 或 `provider_mode = "byok" | "prism"`（EVO-2 实现分流）
4. 删除或隔离 `effective_model_id` 在执行路径上的任何残留

## 非目标

- 内嵌 prism-core（VL-EVO-002）
- 遥测上报（VL-EVO-003）
