description: |
  实现一个最小 App Runtime interpreter（YAML graph executor）：
  - decode markdown 并提取 fenced ASCII blocks
  - 每个 block fanout 调用 LLM 并拿到 FigureSpecV1 JSON
  - 对 JSON + 最小 LaTeX 片段做校验；失败则按 error_log 重提示重试
  - 回写为完整 figure/table LaTeX，并可选交给 pandoc 渲染

acceptance_criteria:
  - "支持单文件最多 10 个 ASCII blocks（超过需返回需要下一版扩容的错误）"
  - "fanout 并发可配置；并发超过时受控（背压/限流可最小实现）"
  - "对 LLM 输出 JSON 做可机读校验，不合规触发 error_log 重提示重试"
  - "提供一个最小 end-to-end fixture：输入 markdown -> 输出 markdown（含 figure/table）"

