description: |
  Extend ai-protocol V2 manifest schema and runtime contract to fully accommodate
  generative large language models, including but not limited to:

  1. **Capability schema expansion**
     - Generative-specific capability declarations: context window, reasoning mode,
       function calling depth, structured output, JSON mode, vision+generation
     - Model family metadata: parameter count ranges, knowledge cutoff,
       pricing tier classification (for routing, not billing)
     - MCP tool bridge JSON schema finalization (currently marked "not fully finalized"
       in MEMORY.md)

  2. **Runtime support contract**
     - Unified request/response envelope for generative models across four runtimes
     - Streaming contract: SSE event shape, partial JSON accumulation, tool-call streaming
     - Token usage reporting contract (prompt/completion/total + reasoning tokens)
     - System message and multi-turn conversation protocol alignment
     - Structured output / JSON mode manifest-driven activation

  3. **Provider manifest coverage**
     - P0 generative models: OpenAI GPT-4o/o3, Anthropic Claude 3.5/4, Google Gemini 2.x
     - P0 China-region: DeepSeek V3/R1, Qwen 2.5/3, Doubao (ByteDance)
     - Manifest fields: model_id, context_window, supported_modalities,
       tool_calling_spec, structured_output_support, reasoning_mode

  4. **Compliance test baseline**
     - New compliance category: `08-generative-capabilities`
     - Cases: context-window-declaration, tool-calling-depth, structured-output-mode,
       reasoning-token-reporting, system-message-handling
     - Must be consumable by four runtimes

  5. **Rollback and compatibility**
     - V1 manifests must remain loadable; new fields are additive-only
     - Runtime loaders must tolerate missing generative fields with explicit defaults
     - Feature flag pattern for experimental capabilities (reasoning mode, etc.)

