description: |
  Define the formal contract between the Execution Layer (E) and the Contact
  Layer (P) based on Paper1 §3.1–3.2 minimality constraint.

  ## Deliverables

  1. **ExecutionResult / ExecutionMetadata type** in four languages (Rust, Python, TS, Go)
     - Fields: provider_id, model_id, execution_latency_ms, translation_latency_ms,
       micro_retry_count, error_code, usage
     - E returns this; P consumes it for routing/retry/degradation decisions

  2. **Module classification matrix** (code-level, not just doc)
     - E-only module list per runtime
     - P-only module list per runtime
     - Shared types that both layers import

  3. **Dependency direction rule**
     - P depends on E (via ExecutionResult contract)
     - E MUST NOT import any P module
     - Compliance fixture to verify: build E-only target with P modules absent

  4. **E-only compliance subset definition**
     - Identify which existing compliance fixtures can run with core-only
     - Flag fixtures that implicitly require P modules (e.g., fallback tests)
     - Create E-only test harness configuration per runtime

  5. **Micro-retry scope definition**
     - E MAY implement 1-2 retries for transient network failures (429, timeout)
     - E MUST NOT implement cross-provider fallback or policy-driven retry
     - Document the exact boundary in code-enforceable terms

execution_protocol: |
  1. Draft type definitions in Rust first (reference implementation)
  2. Transpose to Python, TypeScript, Go
  3. Write dependency-direction verification test
  4. Review against Paper1 §3.1–3.2 checklist
  5. Get sign-off before PT-068~071 proceed

