description: |
  Policy (pre-1.0 / pre-public): breaking layout and paths are OK. Optional thin
  aggregation crate only if it stays trivial; document new entrypoints in CHANGELOG.

  Split ai-lib-rust into a Cargo workspace with two primary crates:

  ## ai-lib-core (最小执行层)

  Modules retained (from PT-067 classification):
  - types, error, error_code, protocol, drivers, transport, pipeline,
    structured, client (single-shot chat/stream), mcp, registry, utils
  - Optional features: embeddings, stt, tts, rerank, multimodal, computer_use
  - Resilience: ONLY bounded micro-retry (1-2 attempts, network transient)

  Zero state. Zero policy. Deterministic execution.

  ## ai-lib-contact (策略层)

  Modules extracted from current crate:
  - routing, cache, batch, plugins, interceptors, tokens, telemetry,
    guardrails (strategy engine), feedback (collector/sinks)
  - Resilience: circuit breaker, complex rate limiter, fallback chains
  - Depends on ai-lib-core

  ## Optional: workspace root / metapackage (ai-lib-rust)

  May re-export core + contact for one-line dependency, or omit; not required for
  Wave 5 success. If omitted, migration notes point consumers to ai-lib-core and
  ai-lib-contact directly.

  ## WASM readiness gate

  `cargo build --target wasm32-wasip1 -p ai-lib-core` must compile.
  HTTP transport shimmed via conditional compilation (#[cfg(target_arch = "wasm32")]).

execution_protocol: |
  1. Create Cargo workspace (two required members: ai-lib-core, ai-lib-contact; optional third for aggregation)
  2. Move E modules to ai-lib-core
  3. Move P modules to ai-lib-contact
  4. Wire ai-lib-contact depends-on ai-lib-core
  5. Optionally wire root/metapackage re-exports; otherwise document new crate names in CHANGELOG
  6. cargo fmt + clippy -D warnings + cargo test (full workspace)
  7. cargo test -p ai-lib-core (core-only compliance)
  8. cargo build --target wasm32-wasip1 -p ai-lib-core (WASM gate)

