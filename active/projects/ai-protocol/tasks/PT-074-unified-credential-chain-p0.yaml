description: |
  Establish a unified credential resolution contract for ai-lib applications.
  This is a P0 infrastructure task discovered during ZeroSpider's ai-lib migration:
  without a hosted credential platform, runtimes must provide a consistent BYOK
  chain based on manifest-declared auth, explicit application overrides, local
  environment variables, keyrings where available, and optional external resolvers.

  The goal is to keep provider identity, credential requirements, availability
  checks, and request auth attachment inside ai-lib / ai-protocol infrastructure,
  not duplicated in downstream agent applications.

architecture_contract: |
  Default credential precedence:
  1. explicit application override
  2. manifest-declared env (`endpoint.auth.token_env`, top-level `auth.token_env`, `auth.key_env`)
  3. conventional `{PROVIDER_ID_UPPER}_API_KEY`
  4. platform keyring when supported and enabled
  5. optional external resolver plugin

  Credential resolution returns redacted metadata for diagnostics. Runtimes must
  never log raw credential values. WASM must not rely on implicit host env/keyring
  access; it uses explicit or host-supplied resolver inputs.

