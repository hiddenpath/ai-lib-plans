description: |
  Execute PT-061 Phase 1 PoC using the physically separated ai-lib-core
  crate from PT-068.

  ## Build targets

  1. wasm32-wasip1 (primary, server-side WASM runtimes)
  2. wasm32-unknown-unknown (stretch, browser via wasm-bindgen)

  ## Exported WASM functions (from PT-061 contract)

  1. load_manifest(yaml_bytes) → manifest_handle
  2. check_capability(handle, capability_name) → bool
  3. build_chat_request(handle, messages_json) → request_json
  4. parse_chat_response(response_json) → normalized_json
  5. classify_error(status_code, body_json) → error_code
  6. extract_usage(response_json) → usage_json

  ## Success criteria

  - Binary size < 2MB (wasm32-wasip1)
  - Manifest parse time < 10ms in wasmtime
  - Protocol_loading + message_building compliance subset passes in wasmtime
  - No dependency on routing/cache/batch/plugins/telemetry

  ## Shim requirements (from PT-061 analysis)

  - HTTP client: host-provided fetch (not compiled in)
  - Filesystem: read-only for manifest loading via WASI
  - Random/Time: WASI or stub for non-WASI targets
  - TLS: not needed (host handles networking)

  ## Browser PoC (stretch)

  - wasm-bindgen wrapper
  - Load manifest from JS, build request, parse response
  - Demo in simple HTML page

