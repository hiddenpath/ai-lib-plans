description: |
  Ensure Rust, Python, TypeScript, and Go runtimes achieve semantic parity
  for generative large model capabilities defined in PT-057.

  Alignment dimensions:
  1. **Message building**: system/user/assistant/tool role handling, multi-turn
     context construction, structured output mode activation
  2. **Streaming decode**: SSE event parsing, partial tool-call accumulation,
     reasoning token extraction, chunk-level error propagation
  3. **Tool calling**: MCP bridge consumption, recursive tool-call depth,
     parallel tool execution semantics
  4. **Token reporting**: prompt/completion/total/reasoning token extraction
     and normalization from heterogeneous provider responses
  5. **Error classification**: generative-specific errors (context overflow,
     content filter, rate limit with retry-after) mapping to E-codes
  6. **Fallback and resilience**: cross-provider fallback behavior for
     generative workloads, circuit breaker threshold alignment

  Execution approach:
  - Build shared compliance fixture matrix under `08-generative-capabilities`
  - Each runtime must pass identical fixture set with semantic equivalence
  - Go runtime may lag by one sprint but must have explicit catch-up plan
  - Compliance gate (`gate:compliance-matrix`) must include generative category

  Per-runtime deliverables:
  - ai-lib-rust: generative manifest consumption + streaming + tool-call tests
  - ai-lib-python: generative manifest consumption + streaming + tool-call tests
  - ai-lib-ts: protocol-v2 generative compliance suite
  - ai-lib-go: generative loader + streaming + error classification tests

