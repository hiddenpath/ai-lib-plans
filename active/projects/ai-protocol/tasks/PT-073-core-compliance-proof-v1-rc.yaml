description: |
  **Readiness work for v1.0.0** — proves the minimal execution layer (Paper1 §3)
  is engineering-complete across supported targets **without** acting as an automatic
  "flip switch" to 1.0. **Tagging and publishing v1.0.0** (release train below)
  requires **explicit maintainer approval**. Until then, ship only **patch bumps**
  on the current **0.x** series (e.g. 0.8.5 → 0.8.6). Rationale: after 1.0,
  SemVer expects **backward-compatible** evolution for 1.x; preparation must stay
  cautious as the gate fills in.

  Pre-1.0 policy (WAVE5 plan §1.4): backward compatibility is not a release gate;
  migration documentation and CHANGELOG are blocking instead.

