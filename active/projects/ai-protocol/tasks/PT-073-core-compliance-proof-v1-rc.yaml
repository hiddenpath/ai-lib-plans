  Pre-1.0 policy (WAVE5 plan §1.4): backward compatibility is not a release gate;
  migration documentation and CHANGELOG are blocking instead.

  ## Gate checklist

  ### 1. Core-only compliance (blocking)

  - [ ] ai-lib-core (Rust): cargo test -p ai-lib-core → full compliance PASS
  - [ ] ai-lib-python[core]: pytest tests/compliance/ → PASS
  - [ ] @ailib/core (TS): npm test → compliance PASS
  - [ ] ai-lib-go: go test ./... → compliance PASS (already core-only)

  ### 2. WASM compliance (blocking)

  - [ ] wasm32-wasip1 binary < 2MB
  - [ ] wasmtime harness: protocol_loading + message_building PASS
  - [ ] 6 exported functions verified

  ### 3. E/P separation integrity (blocking)

  - [ ] No P-module imports in any core package (verified by build test)
  - [ ] ExecutionMetadata returned by all four runtimes
  - [ ] ai-lib-contact (Rust/Python/TS) compiles against core

  ### 4. Migration documentation (blocking)

  - [ ] CHANGELOG per runtime: new package/crate names, breaking import paths, migration notes
  - [ ] Internal consumers (e.g. spiderswitch) updated or tracked with explicit follow-up issue

  ### 5. Governance gates (blocking)

  - [ ] drift:check → no critical findings
  - [ ] gate:fullchain → PASS in required mode
  - [ ] Rollback drill evidence refreshed

  ### 6. Documentation and release (blocking)

  - [ ] Release notes cover: E/P separation, WASM support, minimality proof
  - [ ] ailib.info updated with new package structure
  - [ ] MEMORY.md updated with v1.0.0 decision record
  - [ ] CHANGELOG for all packages

  ## Release train (if gate PASS)

  1. Tag ai-protocol v1.0.0
  2. Tag ai-lib-core (Rust) v1.0.0
  3. Tag ai-lib-contact (Rust) v1.0.0
  4. Tag optional aggregation crate / workspace root v1.0.0 if it exists; else skip
  5. Tag ai-lib-python v1.0.0
  6. Tag ai-lib-ts v1.0.0 (core + contact + facade)
  7. Tag ai-lib-go v1.0.0
  8. Publish WASM package v1.0.0
  9. Tag ai-protocol-mock v1.0.0
  10. Update spiderswitch to consume ai-lib-contact

  ## Hold criteria

  - Any core-only compliance failure
  - WASM binary > 2MB without clear mitigation
  - P-module leak detected in any core package
  - Undocumented breaking surface (CHANGELOG/migration missing) for intentional layout changes

