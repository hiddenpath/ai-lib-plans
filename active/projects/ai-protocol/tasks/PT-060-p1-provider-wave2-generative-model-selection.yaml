description: |
  Select and schedule Wave-2 generative LLM providers for protocol onboarding
  beyond the P0 baseline (OpenAI/Anthropic/Gemini/DeepSeek/Qwen/Doubao) and
  Wave-1 P1 set (Cohere/Moonshot/Zhipu/Jina).

  Selection criteria (scored 1-5, following PT-019 methodology):
  - Generative capability depth (reasoning, structured output, long context)
  - Demand fit (ecosystem adoption, community request volume)
  - API contract maturity (stable endpoints, documented error codes)
  - Multimodal generation support (text+image, text+code, text+video)
  - Operational risk (drift frequency, breaking change history)

  Candidate pool for evaluation:
  - Global: Mistral, Perplexity, Grok (xAI), Meta Llama (hosted), Reka
  - China: MiniMax, Baichuan, Yi (01.AI), SenseTime SenseNova, Stepfun
  - Specialized: Stability AI (image gen), ElevenLabs (TTS), Runway (video)

  Per-provider onboarding checklist:
  1. ai-protocol: capability manifest + error/retry mapping
  2. ai-protocol-mock: generative scenario template + failure injection
  3. Four runtimes: request/event/error/retry semantic alignment
  4. spiderswitch: capability signal consumption validation
  5. Compliance: 08-generative-capabilities fixture pass
  6. Docs/release: capability matrix and release note alignment

  Execution rhythm:
  - Week 1: evidence scoring freeze + ranking
  - Week 2: dependency/sequencing lock + first provider e2e onboarding
  - Week 3-4: batch onboarding with per-provider PR + gate evidence

