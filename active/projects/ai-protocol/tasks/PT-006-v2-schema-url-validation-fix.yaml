description: |
  Remote updates introduced V2 schema validation failures in CI and local runs.
  The validator crashed with MissingRefError while compiling provider.json because
  newly referenced V2 sub-schemas were not preloaded. In addition, V2 schema
  $id values pointed at ai-protocol.dev URLs which are not currently resolvable.

