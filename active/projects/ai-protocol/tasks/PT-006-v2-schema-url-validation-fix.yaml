completion_notes: |
  Completed root-cause fix and verification.

  What was fixed:
  - Updated scripts/validate.js to dynamically preload all schemas/v2/*.json
    (except provider.json) before validating providers. This prevents MissingRefError
    when provider.json gains new $ref targets such as pricing.json.
  - Updated schemas/v2/*.json $id host from ai-protocol.dev to canonical
    raw.githubusercontent.com path to avoid non-resolvable host dependency.
  - Updated .github/workflows/validate.yml trigger paths and yamllint scope to
    include v2/** and v2-alpha/providers.
  - Fixed duplicate mapping key in v2-alpha/providers/anthropic.yaml that caused
    npm run build to fail.

  Verification:
  - npm run validate ✅
  - npm run validate -- --providers ✅
  - npm run validate -- --schemas ✅
  - npm run build ✅

tech_considerations:
  architecture: |
    Keep schema loading dynamic so adding new V2 schema files does not require
    validator code changes.

  performance: |
    Dynamic file loading adds negligible overhead compared with full validation run.

  security: |
    Avoid external, non-resolvable schema hosts in identifiers used by tooling.

  compatibility: |
    Preserve provider $schema compatibility with existing canonical raw GitHub path.

