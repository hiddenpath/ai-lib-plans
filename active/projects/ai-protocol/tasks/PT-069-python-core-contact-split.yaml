description: |
  Split ai-lib-python into core and contact distribution surfaces.

  ## Option A: extras-based split (preferred for PyPI simplicity)

  - `pip install ai-lib-python` → core only (E modules)
  - `pip install ai-lib-python[contact]` → adds routing/cache/batch/plugins/etc.
  - `pip install ai-lib-python[full]` → everything (optional convenience extra; not a compat guarantee)

  ## Option B: separate packages

  - `ai-lib-core` + `ai-lib-contact` on PyPI
  - `ai-lib-python` becomes metapackage

  ## Core modules (E)

  types, errors, protocol, drivers, transport, pipeline, structured,
  client (single-shot), mcp, registry, utils, embeddings, stt, tts,
  rerank, multimodal, computer_use
  Resilience: only bounded retry helper

  ## Contact modules (P) — extracted

  routing, cache, batch, plugins, tokens, telemetry (exporters),
  guardrails (strategy), feedback (collectors), resilience (circuit breaker,
  complex rate limiter, fallback)

  ## Validation

  - `pip install ai-lib-python` (core-only) + `pytest tests/compliance/` passes
  - No import of routing/cache/batch/plugins/tokens/telemetry in core path
  - mypy strict on both surfaces

execution_protocol: |
  1. Restructure pyproject.toml extras or create workspace
  2. Guard P-module imports with lazy import / extras check
  3. Run ruff + mypy + pytest on core-only install
  4. Run full test suite on [full] install
  5. Verify mkdocs build

