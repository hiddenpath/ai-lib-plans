description: |
  Extend ai-protocol-mock to provide comprehensive generative LLM behavior
  simulation for downstream runtime testing and development.

  New mock scenarios:
  1. **Generative chat completion**
     - Sync and streaming responses with configurable token counts
     - Multi-turn conversation context echo for semantic verification
     - System message handling and priority behavior
     - Structured output / JSON mode response generation

  2. **Tool calling simulation**
     - Single and parallel tool-call generation in streaming mode
     - Recursive tool-call chains (depth 1~3)
     - MCP tool bridge request/response format
     - Tool-call error injection (malformed schema, timeout, partial)

  3. **Reasoning mode simulation**
     - Extended thinking / reasoning token generation
     - Reasoning + answer split in streaming chunks
     - Reasoning token count in usage metadata

  4. **Error and edge cases**
     - Context window overflow simulation
     - Content filter trigger with provider-specific error shapes
     - Rate limit with Retry-After header behavior
     - Partial streaming failure mid-response

  5. **Token usage reporting**
     - Accurate prompt/completion/total/reasoning token counts
     - Provider-variant usage field shapes (OpenAI vs Anthropic vs Gemini)

  Mock control:
  - Request headers/body parameters for scenario selection
  - Deterministic behavior for reproducible compliance testing
  - Default-safe: unknown scenarios return standard chat completion

