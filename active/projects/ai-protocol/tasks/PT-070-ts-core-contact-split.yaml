description: |
  Split ai-lib-ts into core and contact npm packages.

  ## Package structure

  - `@ailib/core` — minimal execution layer (E modules)
  - `@ailib/contact` — strategy layer (P modules), depends on @ailib/core
  - `@ailib/ai-lib-ts` — optional aggregation re-export; omit if cleaner to depend on core+contact only

  ## Core modules (E)

  types, errors, protocol, transport (HTTP only), pipeline, structured,
  client (single-shot chat/stream), mcp, streaming (CancelHandle),
  embeddings, stt, tts, rerank
  Resilience: micro-retry only in transport

  ## Contact modules (P) — extracted

  routing (ModelManager, selectors), cache, batch, plugins, interceptors,
  tokens, telemetry, guardrails, negotiation (FallbackChain, parallelAll)
  Resilience: circuit breaker, rate limiter, backpressure

  ## Validation

  - `npm test` on @ailib/core alone passes compliance suites
  - `npm run typecheck` clean on both packages
  - `npm run lint` clean on both packages
  - Tree-shaking: core-only bundle size measured and documented

execution_protocol: |
  1. Create npm workspace or separate packages
  2. Move E modules to @ailib/core
  3. Move P modules to @ailib/contact
  4. Wire dependencies
  5. eslint + typecheck + vitest on both
  6. Measure bundle size of core-only

acceptance_criteria:
  - "@ailib/core passes compliance matrix independently"
  - "@ailib/contact depends on @ailib/core, not vice versa"
  - "CHANGELOG documents package layout and any breaking import changes"
  - "Core-only bundle size documented (target: < 50KB minified)"

